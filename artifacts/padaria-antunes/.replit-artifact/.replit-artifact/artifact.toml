kind = "web"
previewPath = "/"
title = "Pão do Antunes — Landing Page"
version = "1.0.0"
id = "artifacts/padaria-antunes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24013
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/padaria-antunes run dev"

[services.env]
PORT = "24013"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/padaria-antunes", "run", "build"]
publicDir = "artifacts/padaria-antunes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
